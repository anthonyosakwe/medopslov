<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#03050c">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MedOps">
<title>MedOps Command v3.2</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg0:#03050c;--bg1:#070b16;--bg2:#0d1220;--bg3:#111827;
  --b0:#172236;--b1:#1f3050;
  --amber:#e8a020;--amberlo:rgba(232,160,32,0.13);
  --cyan:#38bdf8;--cyanlo:rgba(56,189,248,0.12);
  --green:#22d3a5;--greenlo:rgba(34,211,165,0.11);
  --red:#f87171;--redlo:rgba(248,113,113,0.12);
  --orange:#fb923c;--orangelo:rgba(251,146,60,0.12);
  --purple:#a78bfa;--purplo:rgba(167,139,250,0.12);
  --t1:#dde4ed;--t2:#6e849c;--t3:#324055;
}
*{box-sizing:border-box;margin:0;padding:0}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--bg0)}
::-webkit-scrollbar-thumb{background:var(--b0);border-radius:2px}
body{font-family:'Share Tech Mono','Courier New',monospace;background:var(--bg0);color:var(--t1);height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased;touch-action:pan-y}
#pagedots{display:flex;justify-content:center;gap:5px;padding:5px 0 3px;background:var(--bg1);flex-shrink:0}
.pdot{width:20px;height:3px;border-radius:2px;background:var(--b1);transition:all 0.3s}
.pdot.on{background:var(--amber);width:28px}
#hdr{background:var(--bg1);border-bottom:1px solid var(--b0);padding:8px 14px;flex-shrink:0}
.hdr-top{display:flex;align-items:center;justify-content:space-between}
.htitle{font-family:'Orbitron',monospace;font-size:13px;font-weight:900;letter-spacing:3px;color:var(--amber)}
.hright{display:flex;align-items:center;gap:8px}
.hf{font-size:9px;letter-spacing:1px}
.hdot{width:7px;height:7px;border-radius:50%;background:var(--t3);transition:all 0.4s}
.hdot.live{background:var(--green);box-shadow:0 0 8px var(--green)}
@keyframes pulseglow{0%,100%{opacity:0.25;box-shadow:0 0 3px var(--green);transform:scale(0.85)}50%{opacity:1;box-shadow:0 0 10px var(--green),0 0 20px rgba(34,211,165,0.4);transform:scale(1.1)}}
.beatdot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulseglow 2.4s ease-in-out infinite;vertical-align:middle}
.hcloud{font-size:13px;line-height:1;transition:all 0.3s;cursor:pointer}
.hcloud.on{filter:drop-shadow(0 0 4px #22d3a5);color:var(--green)}
.hcloud.off{opacity:0.3}
.hclock{font-size:8px;color:var(--t2);letter-spacing:1px;margin-top:2px}
#tbr{display:flex;overflow-x:auto;background:var(--bg1);border-bottom:1px solid var(--b0);flex-shrink:0;scrollbar-width:none}
#tbr::-webkit-scrollbar{display:none}
.tb{flex:0 0 auto;padding:8px 10px;font-size:8.5px;letter-spacing:1.8px;font-weight:700;cursor:pointer;color:var(--t3);background:none;border:none;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:color 0.2s}
.tb.on{color:var(--amber);border-bottom-color:var(--amber)}
#swipewrap{flex:1;overflow:hidden;position:relative}
#swipetrack{display:flex;height:100%;transition:transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94);will-change:transform}
.swipepage{flex:0 0 100%;height:100%;overflow-y:auto;padding:12px 12px 50px;-webkit-overflow-scrolling:touch}
.card{background:var(--bg2);border:1px solid var(--b0);border-radius:7px;padding:13px;margin-bottom:10px}
.card.ca{border-color:var(--amber)}.card.cg{border-color:var(--green)}.card.cc{border-color:var(--cyan)}.card.cr{border-color:var(--red)}.card.cp{border-color:var(--purple)}
.lbl{font-size:8.5px;letter-spacing:2.5px;color:var(--t3);margin-bottom:7px;font-weight:700;display:block}
.big{font-family:'Orbitron',monospace;font-weight:900;line-height:1}
.cmdbox{border-radius:7px;padding:14px;text-align:center;margin-bottom:10px;border:1px solid}
.btn{background:var(--bg3);border:1px solid var(--b1);color:var(--t1);padding:9px 16px;border-radius:5px;cursor:pointer;font-size:9.5px;letter-spacing:1.8px;font-weight:700;font-family:inherit;transition:all 0.15s;-webkit-tap-highlight-color:transparent;display:inline-block}
.btn:active{opacity:0.7;transform:scale(0.97)}
.btn.bg{background:rgba(34,211,165,0.12);border-color:var(--green);color:var(--green)}
.btn.br{background:var(--redlo);border-color:var(--red);color:var(--red)}
.btn.bc{background:var(--cyanlo);border-color:var(--cyan);color:var(--cyan)}
.btn.ba{background:var(--amberlo);border-color:var(--amber);color:var(--amber)}
.btn.bp{background:var(--purplo);border-color:var(--purple);color:var(--purple)}
.btn.bfull{width:100%;text-align:center;display:block}
input[type=range]{width:100%;accent-color:var(--amber);cursor:pointer;height:3px;display:block}
.row{display:flex;gap:8px;margin-bottom:8px}
.srow{display:flex;gap:7px;margin-bottom:10px}
.sc{flex:1;background:var(--bg2);border-radius:6px;padding:10px 7px;text-align:center;border:1px solid}
.pbar{background:#162030;height:5px;border-radius:3px;overflow:hidden;margin:7px 0}
.pfill{height:100%;border-radius:3px;transition:width 0.4s}
.li{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--b0)}
.li:last-child{border-bottom:none}
.sh{display:flex;justify-content:space-between;margin-bottom:4px}
.sl-lbl{font-size:8.5px;color:var(--t3);letter-spacing:1px}
.sv{font-size:11px;color:var(--amber)}
.sr{margin-bottom:11px}
.cwrap{position:relative;width:100%;margin-top:6px}
.bdots{display:flex;justify-content:center;gap:6px;margin-top:10px}
.bdot{width:6px;height:6px;border-radius:50%;background:var(--t3);cursor:pointer}
.bdot.on{background:var(--green)}
.toggle{display:flex;align-items:center;gap:8px;cursor:pointer}
.tknob{width:36px;height:18px;border-radius:9px;background:var(--bg3);border:1px solid var(--b1);position:relative;transition:background 0.3s;flex-shrink:0}
.tknob.on{background:rgba(34,211,165,0.2);border-color:var(--green)}
.tknob::after{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:var(--t3);top:2px;left:2px;transition:all 0.3s}
.tknob.on::after{background:var(--green);left:20px;box-shadow:0 0 6px var(--green)}
#scanline{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:50;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.035) 3px,rgba(0,0,0,0.035) 4px)}
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--amber);border-radius:8px;padding:10px 14px;z-index:200;display:none;align-items:center;gap:10px;white-space:nowrap;box-shadow:0 0 20px rgba(232,160,32,0.2)}
#toast span{font-size:9px;color:var(--amber);letter-spacing:1px}
#toast button{background:var(--amber);color:var(--bg0);border:none;padding:5px 10px;border-radius:3px;font-size:8px;font-weight:700;font-family:inherit;cursor:pointer}
.chk{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--b0);cursor:pointer;-webkit-tap-highlight-color:transparent}
.chk:last-child{border-bottom:none}
.chkbox{width:18px;height:18px;border-radius:3px;border:1px solid var(--b1);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;margin-top:1px;font-size:11px;color:var(--bg0)}
.chkbox.done{background:var(--green);border-color:var(--green)}
.chktxt{flex:1}
.chktitle{font-size:11px;color:var(--t1);transition:color 0.2s}
.chktitle.done{color:var(--t3);text-decoration:line-through}
.chksub{font-size:9px;color:var(--t3);margin-top:2px}
.streak-box{background:var(--bg2);border:1px solid var(--amber);border-radius:7px;padding:13px;margin-bottom:10px}
.streak-row{display:flex;justify-content:space-between;align-items:flex-start}
.streak-num{font-family:'Orbitron',monospace;font-size:42px;font-weight:900;color:var(--amber);line-height:1}
.streak-meta{text-align:right;font-size:8.5px;color:var(--t3);line-height:2}
@keyframes swipehint{0%{opacity:0;transform:translateX(0)}30%{opacity:1}70%{opacity:1;transform:translateX(-12px)}100%{opacity:0;transform:translateX(-12px)}}
.swipehint{position:fixed;bottom:60px;right:16px;font-size:18px;pointer-events:none;animation:swipehint 2s ease 1.5s forwards;z-index:100;color:var(--amber)}
/* ROLLOVER BANNER */
.rollover-banner{background:var(--amberlo);border:1px solid var(--amber);border-radius:7px;padding:10px 13px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.rollover-banner .rb-title{color:var(--amber);font-size:10px;letter-spacing:1.5px;font-weight:700;margin-bottom:3px}
.rollover-banner .rb-body{font-size:9.5px;color:var(--t1);line-height:1.5}
.rollover-banner .rb-dismiss{background:none;border:1px solid var(--b1);color:var(--t2);padding:5px 10px;border-radius:3px;font-size:9px;cursor:pointer;font-family:inherit;flex-shrink:0}
/* QUICK-LOG PANEL */
.qlog-panel{margin-top:10px;padding:14px;border:1px solid var(--cyan);border-radius:8px;background:rgba(56,189,248,0.04)}
.qlog-head{display:flex;align-items:center;justify-content:space-between}
.qlog-val{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:var(--cyan)}
.chiprow{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.chip{flex:1 1 auto;min-width:50px;padding:9px 6px;background:rgba(15,23,42,0.6);border:1px solid rgba(148,163,184,0.25);border-radius:6px;color:var(--t1);font-family:inherit;font-size:10px;letter-spacing:0.5px;cursor:pointer;transition:border-color 0.15s,color 0.15s,background 0.15s;text-align:center}
.chip.active{border-color:var(--cyan);color:var(--cyan);background:rgba(56,189,248,0.08)}
.done-btn{width:100%;margin-top:14px;padding:13px;background:rgba(34,211,165,0.08);border:1px solid var(--green);border-radius:6px;color:var(--green);font-family:inherit;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:background 0.15s}
/* SLIDER ENHANCED */
.slider-hint{font-size:8.5px;color:var(--t3);margin-bottom:5px;letter-spacing:0.5px}
.slider-ends{display:flex;justify-content:space-between;margin-top:3px;font-size:7.5px;color:var(--t3)}
/* LAST BAYES CARD */
.bayes-card{background:rgba(167,139,250,0.06);border:1px solid var(--purple);border-radius:7px;padding:13px;margin-bottom:10px}
</style>
</head>
<body>
<div id="scanline"></div>
<div id="toast"><span id="ttoast"></span><button onclick="dismissToast()">OK</button></div>
<div class="swipehint" id="sh">← swipe</div>

<div id="hdr">
  <div class="hdr-top">
    <div>
      <div class="htitle">MEDOPS ⌬ COMMAND</div>
      <div class="hclock" id="clk">--</div>
    </div>
    <div class="hright">
      <span class="hcloud off" id="hcloud" title="Google Drive Sync" onclick="googleSignIn()">☁</span>
      <span class="hf" id="hf" style="color:var(--green)">F:--</span>
      <div class="hdot" id="hdot"></div>
    </div>
  </div>
</div>

<div id="tbr">
  <button class="tb on" onclick="go(0)">● ANALYTICS</button>
  <button class="tb"    onclick="go(1)">▶ COMMAND</button>
  <button class="tb"    onclick="go(2)">○ FATIGUE</button>
  <button class="tb"    onclick="go(3)">∿ OPTIMIZER</button>
  <button class="tb"    onclick="go(4)">⊕ PROTOCOL</button>
  <button class="tb"    onclick="go(5)">◈ SYSTEM</button>
</div>

<div id="pagedots">
  <div class="pdot on"></div><div class="pdot"></div><div class="pdot"></div>
  <div class="pdot"></div><div class="pdot"></div><div class="pdot"></div>
</div>

<div id="swipewrap">
  <div id="swipetrack">
    <div class="swipepage" id="p0"></div>
    <div class="swipepage" id="p1"></div>
    <div class="swipepage" id="p2"></div>
    <div class="swipepage" id="p3"></div>
    <div class="swipepage" id="p4"></div>
    <div class="swipepage" id="p5"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// GOOGLE OAUTH CONFIG
// ══════════════════════════════════════════════
const GOOGLE_CLIENT_ID = '662716595691-4vr6qam4bl1a028a7810g0vnt84g364n.apps.googleusercontent.com';
const DRIVE_FILENAME   = 'medops_data_v3.json';
const SCOPES           = 'https://www.googleapis.com/auth/drive.appdata';
let gapiReady=false,gisReady=false,accessToken=null,tokenClient=null;

function onGapiLoad(){
  gapi.load('client',async()=>{
    await gapi.client.init({discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']});
    gapiReady=true;tryInitGIS();
  });
}
function onGISLoad(){gisReady=true;tryInitGIS();}
function tryInitGIS(){
  if(!gapiReady||!gisReady)return;
  if(!GOOGLE_CLIENT_ID||GOOGLE_CLIENT_ID===''){S.cloudSync=false;return;}
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:GOOGLE_CLIENT_ID,scope:SCOPES,
    callback:(resp)=>{
      if(resp.error){showToast('⚠ GOOGLE AUTH FAILED');return;}
      accessToken=resp.access_token;
      S.cloudSync=true;save();loadDriveData();
    }
  });
}
function googleSignIn(){
  if(!GOOGLE_CLIENT_ID||GOOGLE_CLIENT_ID===''){showToast('⚠ No Client ID configured',4000);return;}
  if(!tokenClient){showToast('⚠ Google SDK loading — try again in 2s');return;}
  tokenClient.requestAccessToken({prompt:accessToken?'':'consent'});
}
function googleSignOut(){
  if(accessToken)google.accounts.oauth2.revoke(accessToken,()=>{});
  accessToken=null;S.cloudSync=false;S.userEmail='';save();
  showToast('✓ SIGNED OUT');hdr();go(5);
}
async function saveToDrive(){
  if(!accessToken)return;
  try{
    const data=JSON.stringify(S);
    const list=await gapi.client.drive.files.list({spaces:'appDataFolder',q:`name='${DRIVE_FILENAME}'`,fields:'files(id)'});
    const files=list.result.files;
    const boundary='medops_boundary';
    const meta=JSON.stringify({name:DRIVE_FILENAME,parents:['appDataFolder']});
    const body=`--${boundary}\r\nContent-Type: application/json\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${data}\r\n--${boundary}--`;
    const headers={'Content-Type':`multipart/related; boundary=${boundary}`,'Authorization':`Bearer ${accessToken}`};
    if(files&&files.length>0){
      await gapi.client.request({path:`/upload/drive/v3/files/${files[0].id}`,method:'PATCH',params:{uploadType:'multipart'},headers,body});
    }else{
      await gapi.client.request({path:'/upload/drive/v3/files',method:'POST',params:{uploadType:'multipart'},headers,body});
    }
    showToast('☁ SYNCED TO GOOGLE DRIVE');
  }catch(e){showToast('⚠ DRIVE SYNC FAILED');}
}
async function loadDriveData(){
  if(!accessToken)return;
  try{
    const list=await gapi.client.drive.files.list({spaces:'appDataFolder',q:`name='${DRIVE_FILENAME}'`,fields:'files(id)'});
    const files=list.result.files;
    if(!files||files.length===0){showToast('☁ DRIVE CONNECTED — NO PRIOR DATA');hdr();return;}
    const resp=await gapi.client.drive.files.get({fileId:files[0].id,alt:'media'});
    const d=typeof resp.result==='string'?JSON.parse(resp.result):resp.result;
    Object.keys(d).forEach(k=>{if(d[k]!==undefined)S[k]=d[k];});
    save();showToast('☁ DATA LOADED FROM GOOGLE DRIVE');
    go(S.tab);hdr();
  }catch(e){showToast('⚠ COULD NOT LOAD DRIVE DATA');}
}
window.addEventListener('load',()=>{
  const s1=document.createElement('script');s1.src='https://apis.google.com/js/api.js';s1.onload=onGapiLoad;document.head.appendChild(s1);
  const s2=document.createElement('script');s2.src='https://accounts.google.com/gsi/client';s2.onload=onGISLoad;document.head.appendChild(s2);
});

// ══════════════════════════════════════════════
// SWIPE NAVIGATION
// ══════════════════════════════════════════════
const NTABS=6;
let touchX0=0,touchY0=0,dragging=false,dragged=0;
const track=document.getElementById('swipetrack');
track.addEventListener('touchstart',e=>{touchX0=e.touches[0].clientX;touchY0=e.touches[0].clientY;dragging=true;dragged=0;},{passive:true});
track.addEventListener('touchmove',e=>{
  if(!dragging)return;
  const dx=e.touches[0].clientX-touchX0;const dy=e.touches[0].clientY-touchY0;
  if(Math.abs(dy)>Math.abs(dx)+10){dragging=false;return;}
  dragged=dx;const base=S.tab*-100;const pct=base+(dx/window.innerWidth*100);
  track.style.transition='none';track.style.transform=`translateX(${pct}%)`;
},{passive:true});
track.addEventListener('touchend',()=>{
  if(!dragging)return;dragging=false;
  const threshold=window.innerWidth*0.2;
  if(dragged<-threshold&&S.tab<NTABS-1)goTo(S.tab+1);
  else if(dragged>threshold&&S.tab>0)goTo(S.tab-1);
  else goTo(S.tab);
},{passive:true});
function goTo(i){
  S.tab=i;
  track.style.transition='transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)';
  track.style.transform=`translateX(${i*-100}%)`;
  document.querySelectorAll('.tb').forEach((b,j)=>b.classList.toggle('on',i===j));
  document.querySelectorAll('.pdot').forEach((d,j)=>d.classList.toggle('on',i===j));
  const tabs=document.querySelectorAll('.tb');if(tabs[i])tabs[i].scrollIntoView({inline:'center',behavior:'smooth'});
  kc();renderPage(i);hdr();
}
function go(i){goTo(i);}

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
const todayISO=()=>new Date().toISOString().slice(0,10);
const ARC={version:"3.2"};
const DEF={
  tab:0,
  sessions:[{d:'MON',f:35,acc:88,b:6,h:2800,sl:7},{d:'TUE',f:42,acc:84,b:5,h:2400,sl:6.5},{d:'WED',f:58,acc:76,b:4,h:1900,sl:5},{d:'THU',f:65,acc:71,b:3,h:1600,sl:5.5},{d:'FRI',f:48,acc:82,b:5,h:2600,sl:7},{d:'SAT',f:30,acc:91,b:7,h:3200,sl:8},{d:'SUN',f:22,acc:95,b:4,h:3500,sl:8.5}],
  tsec:50*60,running:false,phase:'BLOCK',cycle:1,blockDur:50,
  fi:{sleep:7,studyHours:4,errorRate:20,reaction:20,subjective:30,hydration:60},
  h2o:0,bStep:0,bHist:[{t:'Init',b:50}],
  risks:{pain:false,numbness:false,weakness:false,stiffness:false},
  checklist:[false,false,false,false,false],
  streak:1,lastLog:todayISO(),smartAdapt:true,notifAllowed:true,
  sleepLog:[7,6.5,5,5.5,7,8,8.5],hydLog:[2800,2400,1900,1600,2600,3200,3500],
  daysLogged:1,blockAdaptations:1,userEmail:'',cloudSync:false,
  lastBayes:null,   // {ts, prev, next, reason, sessions}
  rolloverDate:''   // ISO date when last rollover happened
};
let S=JSON.parse(JSON.stringify(DEF));
let tiv=null,CJ={};

function save(){try{localStorage.setItem('mo31',JSON.stringify(S));}catch{}}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem('mo31'));
    if(d){Object.assign(S,d);if(S.blockDur)S.tsec=S.blockDur*60;}
  }catch{}
}

// ══════════════════════════════════════════════
// DAY ROLLOVER
// ══════════════════════════════════════════════
function checkRollover(){
  if(S.lastLog===todayISO())return;
  const dys=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const lastDate=new Date(S.lastLog+'T00:00:00');
  const today=new Date(todayISO()+'T00:00:00');
  const gap=Math.round((today-lastDate)/86400000);
  const f=fatigue();
  const yRecord={d:dys[lastDate.getDay()],f:Math.round(f),acc:Math.round(100-f*0.35),b:S.cycle,h:S.h2o,sl:S.fi.sleep};
  S.sessions=[...S.sessions.slice(-13),yRecord];
  S.hydLog=[...S.hydLog.slice(-13),S.h2o];
  S.sleepLog=[...S.sleepLog.slice(-13),S.fi.sleep];
  S.daysLogged++;
  S.h2o=0;S.cycle=1;S.checklist=[false,false,false,false,false];
  S.streak=gap===1?S.streak+1:1;
  S.lastLog=todayISO();
  S.running=false;clearInterval(tiv);tiv=null;S.phase='BLOCK';
  if(S.smartAdapt){
    const prev=S.blockDur;

function fatigue(){
  const{sleep,studyHours,errorRate,reaction,subjective,hydration}=S.fi;
  const sd=Math.max(0,(8-sleep)*12.5);const sl=Math.min(100,(studyHours/12)*100);
  return Math.max(0,Math.min(100,0.25*sd+0.2*sl+0.2*errorRate+0.15*reaction+0.1*subjective-0.1*hydration));
}
function zone(f){
  if(f<=30)return{l:'OPTIMAL',hex:'#22d3a5',lo:'rgba(34,211,165,0.11)'};
  if(f<=60)return{l:'FATIGUE ONSET',hex:'#e8a020',lo:'rgba(232,160,32,0.13)'};
  if(f<=80)return{l:'HIGH FATIGUE',hex:'#fb923c',lo:'rgba(251,146,60,0.12)'};
  return{l:'CRITICAL',hex:'#f87171',lo:'rgba(248,113,113,0.12)'};
}
function dec(f){
  if(f<40)return{cmd:'CONTINUE',reason:'Peak performance window. Maintain current block.',hex:'#22d3a5'};
  if(f<60)return{cmd:'SHORT BREAK',reason:'Fatigue onset detected. 5-min break + hydrate.',hex:'#e8a020'};
  if(f<80)return{cmd:'RECOVER',reason:'High fatigue. 15-min rest + Magnesium + stretch.',hex:'#fb923c'};
  return{cmd:'SLEEP 90MIN',reason:'Critical fatigue. Cognitive impairment risk. Rest now.',hex:'#f87171'};
}
function fmt(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}
function nowStr(){
  const n=new Date();const days=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  return`${days[n.getDay()]}, ${months[n.getMonth()]} ${n.getDate()} · ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
}
function h2oPace(){

function startStop(){

          S.cycle++;S.blockAdaptations++;S.phase='BREAK';S.tsec=5*60;
          if(S.smartAdapt&&changed)S.lastBayes={ts:new Date().toISOString(),prev:S.blockDur,next:nb,reason:'cycle',sessions:S.sessions.length};
          showToast('⏱ BREAK TIME — '+nb+'min next');

  const fm=[{name:'Burnout',risk:f>70?'HIGH':f>50?'MODERATE':'LOW',c:f>70?'var(--red)':f>50?'var(--amber)':'var(--green)'},{name:'Injury',risk:(S.risks.pain||S.risks.stiffness)?'ELEVATED':'LOW',c:(S.risks.pain||S.risks.stiffness)?'var(--amber)':'var(--green)'},{name:'Cognitive Decline',risk:f>80?'HIGH':'LOW',c:f>80?'var(--red)':'var(--green)'}];
  const driveConnected=S.cloudSync&&accessToken;
  document.getElementById('p5').innerHTML=`
    <div class="card cr"><span class="lbl">RED FLAG MONITOR</span>${[{k:'pain',l:'Persistent Pain'},{k:'numbness',l:'Numbness'},{k:'weakness',l:'Weakness'},{k:'stiffness',l:'Severe Stiffness'}].map(({k,l})=>`<div class="li"><span style="font-size:11px;color:${S.risks[k]?'var(--red)':'var(--t2)'}" id="rl_${k}">${l}</span><button class="btn ${S.risks[k]?'br':''}" id="rb_${k}" style="padding:5px 12px;font-size:8.5px" onclick="toggleRisk('${k}')">${S.risks[k]?'● FLAGGED':'○ CLEAR'}</button></div>`).join('')}<div id="rw" style="display:${Object.values(S.risks).some(Boolean)?'block':'none'};margin-top:10px;padding:10px;background:var(--redlo);border-radius:4px;font-size:9.5px;color:var(--red);line-height:1.5">⚠ Flag(s) active. Consult a medical professional if symptoms persist.</div></div>
    <div class="card"><span class="lbl">FAILURE MODE WATCHLIST</span>${fm.map(x=>`<div class="li"><span style="font-size:11px;color:var(--t2)">${x.name}</span><span style="font-size:10px;color:${x.c};letter-spacing:1px">${x.risk}</span></div>`).join('')}</div>
    <div class="card cg"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span class="lbl" style="margin-bottom:0">SMART ADAPT MODE</span><div class="toggle" onclick="toggleSmartAdapt()"><div class="tknob ${S.smartAdapt?'on':''}" id="saknob"></div><span style="font-size:9px;color:${S.smartAdapt?'var(--green)':'var(--t3)'}" id="salbl">${S.smartAdapt?'● ON':'○ OFF'}</span></div></div><div style="font-size:9.5px;color:var(--t2);line-height:1.7">When ON, the Bayesian model auto-applies its recommended block at the end of every cycle. Works offline.</div><div style="margin-top:8px;font-size:9px;color:var(--green)">▶ Model output → next block: ${S.blockDur}min</div></div>
    <div class="card" style="border-color:var(--b1)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span class="lbl" style="margin-bottom:0">NOTIFICATIONS</span><span style="font-size:8.5px;color:${S.notifAllowed?'var(--green)':'var(--t3)'}">● ${S.notifAllowed?'ALLOWED':'OFF'}</span></div><div style="font-size:9.5px;color:var(--t2);line-height:1.7;margin-bottom:10px">Block transitions, critical fatigue, sleep log, hydration shortfalls.</div><button class="btn bfull" onclick="sendTestPing()">SEND TEST PING</button></div>
    <div class="card"><span class="lbl">DATA STORE</span><div style="font-size:10px;color:var(--t2);line-height:2">Days logged: <span style="color:var(--amber)">${S.daysLogged}</span> / 30 max<br>Block adaptations: <span style="color:var(--amber)">${S.blockAdaptations}</span><br>Today: <span style="color:var(--cyan)">${todayISO()}</span> · ${['SUN','MON','TUE','WED','THU','FRI','SAT'][new Date().getDay()]}</div><div class="row" style="margin-top:10px;gap:8px"><button class="btn ba" style="flex:1;font-size:9px" onclick="resetToday()">↺ RESET TODAY</button><button class="btn br" style="flex:1;font-size:9px" onclick="wipeAll()">⚠ WIPE ALL</button></div><button class="btn bp bfull" style="margin-top:8px;font-size:9px" onclick="forceRollover()" title="Simulates midnight — triggers Bayesian day rollover immediately">⏭ SIMULATE NEXT DAY</button></div>
    <div class="card"><span class="lbl">WEEKLY STRUCTURE</span>${['MORNING DEEP WORK','MIDDAY INTEGRATION','AFTERNOON APPLICATION','EVENING REVIEW'].map((x,i)=>`<div class="li"><span style="font-size:9px;color:var(--purple);min-width:18px">${i+1}.</span><span style="font-size:10px;color:var(--t2)">${x}</span></div>`).join('')}<div style="margin-top:8px;font-size:8.5px;color:var(--t3)">6 active days · 1 full recovery day</div></div>
    <div class="card cg"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span class="lbl" style="margin-bottom:0">CLOUD SYNC · GOOGLE DRIVE</span><span style="font-size:8.5px;color:${driveConnected?'var(--green)':'var(--t3)'}">○ ${driveConnected?'CONNECTED':'IDLE'}</span></div>${driveConnected?`<div style="font-size:9.5px;color:var(--t2);line-height:1.7;margin-bottom:8px">Signed in. Data mirrors to Drive automatically on session log.</div><button class="btn bfull" onclick="googleSignOut()">○ SIGN OUT (KEEP LOCAL DATA)</button>`:`<div style="font-size:9.5px;color:var(--t2);line-height:1.7;margin-bottom:10px">Sign in with Google to mirror your data to Drive (private app folder only). Access MedOps from any device.</div><button class="btn bfull" style="background:#fff;border-color:#dadce0;color:#3c4043;display:flex;align-items:center;justify-content:center;gap:8px;font-size:10px" onclick="googleSignIn()"><svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>SIGN IN WITH GOOGLE</button>`}</div>
    <div class="card ca"><span class="lbl">WEEKLY REPORT</span><div style="font-size:9.5px;color:var(--t2);line-height:1.7;margin-bottom:10px">One-page printable summary — fatigue, accuracy, blocks, hydration, streak, Bayesian advisory. Save as PDF.</div><button class="btn ba bfull" onclick="openWeeklyReport()">≡ OPEN WEEKLY REPORT</button></div>
    <div class="card ca"><span class="lbl">SYSTEM ARCHIVE — v3.2</span><div style="font-size:8.5px;color:var(--t2);line-height:1.9;margin-bottom:10px">F=${Math.round(f)} · Zone=${z.l} · Block=${S.blockDur}min<br>H₂O=${S.h2o}ml · Cycles=${S.cycle} · ${todayISO()}</div><button class="btn ba bfull" style="font-weight:700;letter-spacing:2px;font-size:10.5px" onclick="dlArchive()">↓ DOWNLOAD JSON ARCHIVE v3.2</button></div>
    <div style="text-align:center;color:var(--t3);font-size:7.5px;letter-spacing:2px;margin-top:14px;line-height:2">MEDOPS COMMAND v3.2 · ALL LAYERS ACTIVE<br>COMPLETE EDITION</div>`;
}

// ══════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════
load();
checkRollover();
for(let i=0;i<6;i++)renderPage(i);
track.style.transition='none';
track.style.transform=`translateX(${S.tab*-100}%)`;
document.querySelectorAll('.tb').forEach((b,j)=>b.classList.toggle('on',S.tab===j));
document.querySelectorAll('.pdot').forEach((d,j)=>d.classList.toggle('on',S.tab===j));
hdr();
setInterval(clockTick,1000);clockTick();
setInterval(checkRollover,60000);
setTimeout(()=>{const h=document.getElementById('sh');if(h)h.remove();},5000);
</script>
</body>
</html>
