<html lang="en">
<head>

<title>MedOpsLov (Lovable prototype for Git) 3.2</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
:root{
  --bg0:#03050c;--bg1:#070b16;--bg2:#0d1220;--bg3:#111827;
  --b0:#172236;--b1:#1f3050;
  --amber:#e8a020;--amberlo:rgba(232,160,32,0.13);
  --cyan:#38bdf8;--cyanlo:rgba(56,189,248,0.12);
  --green:#22d3a5;--greenlo:rgba(34,211,165,0.11);
  --red:#f87171;--redlo:rgba(248,113,113,0.12);
  --orange:#fb923c;--orangelo:rgba(251,146,60,0.12);
  --purple:#a78bfa;--purplo:rgba(167,139,250,0.12);
  --t1:#dde4ed;--t2:#6e849c;--t3:#324055;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Share Tech Mono','Courier New',monospace;background:var(--bg0);color:var(--t1);height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased;touch-action:pan-y}

/* SWIPE INDICATOR DOTS */
#pagedots{display:flex;justify-content:center;gap:5px;padding:5px 0 3px;background:var(--bg1);flex-shrink:0}
.pdot{width:20px;height:3px;border-radius:2px;background:var(--b1);transition:all 0.3s}
.pdot.on{background:var(--amber);width:28px}

/* HEADER */
#hdr{background:var(--bg1);border-bottom:1px solid var(--b0);padding:8px 14px;flex-shrink:0}
.hdr-top{display:flex;align-items:center;justify-content:space-between}
.htitle{font-family:'Orbitron',monospace;font-size:13px;font-weight:900;letter-spacing:3px;color:var(--amber)}
.hsub{font-size:8px;color:var(--t3);letter-spacing:1.5px;margin-top:1px}
.hright{display:flex;align-items:center;gap:8px}
.hf{font-size:9px;letter-spacing:1px}
.hdot{width:7px;height:7px;border-radius:50%;background:var(--t3);transition:all 0.4s}
.hdot.live{background:var(--green);box-shadow:0 0 8px var(--green)}
/* STEADY PULSE GLOW — slow breathing rhythm */
@keyframes pulseglow{
  0%,100%{opacity:0.25;box-shadow:0 0 3px var(--green);transform:scale(0.85)}
  50%{opacity:1;box-shadow:0 0 10px var(--green),0 0 20px rgba(34,211,165,0.4);transform:scale(1.1)}
}
.beatdot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulseglow 2.4s ease-in-out infinite;vertical-align:middle}
/* CLOUD ICON IN HEADER */
.hcloud{font-size:13px;line-height:1;transition:all 0.3s}
.hcloud.on{filter:drop-shadow(0 0 4px #22d3a5)}
.hcloud.off{opacity:0.3}
.hclock{font-size:8px;color:var(--t2);letter-spacing:1px;margin-top:2px}

/* TABBAR */
#tbr{display:flex;overflow-x:auto;background:var(--bg1);border-bottom:1px solid var(--b0);flex-shrink:0;scrollbar-width:none}
#tbr::-webkit-scrollbar{display:none}
.tb{flex:0 0 auto;padding:8px 10px;font-size:8.5px;letter-spacing:1.8px;font-weight:700;cursor:pointer;color:var(--t3);background:none;border:none;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:color 0.2s}
.tb.on{color:var(--amber);border-bottom-color:var(--amber)}

/* SWIPE VIEWPORT */
#swipewrap{flex:1;overflow:hidden;position:relative}
#swipetrack{display:flex;height:100%;transition:transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94);will-change:transform}
.swipepage{flex:0 0 100%;height:100%;overflow-y:auto;padding:12px 12px 50px;-webkit-overflow-scrolling:touch}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--b0);border-radius:7px;padding:13px;margin-bottom:10px}
.card.ca{border-color:var(--amber)}.card.cg{border-color:var(--green)}.card.cc{border-color:var(--cyan)}.card.cr{border-color:var(--red)}.card.cp{border-color:var(--purple)}
.lbl{font-size:8.5px;letter-spacing:2.5px;color:var(--t3);margin-bottom:7px;font-weight:700;display:block}
.big{font-family:'Orbitron',monospace;font-weight:900;line-height:1}
.cmdbox{border-radius:7px;padding:14px;text-align:center;margin-bottom:10px;border:1px solid}

/* BUTTONS */
.btn{background:var(--bg3);border:1px solid var(--b1);color:var(--t1);padding:9px 16px;border-radius:5px;cursor:pointer;font-size:9.5px;letter-spacing:1.8px;font-weight:700;font-family:inherit;transition:all 0.15s;-webkit-tap-highlight-color:transparent;display:inline-block}
.btn:active{opacity:0.7;transform:scale(0.97)}
.btn.bg{background:rgba(34,211,165,0.12);border-color:var(--green);color:var(--green)}
.btn.br{background:var(--redlo);border-color:var(--red);color:var(--red)}
.btn.bc{background:var(--cyanlo);border-color:var(--cyan);color:var(--cyan)}
.btn.ba{background:var(--amberlo);border-color:var(--amber);color:var(--amber)}
.btn.bp{background:var(--purplo);border-color:var(--purple);color:var(--purple)}
.btn.bfull{width:100%;text-align:center;display:block}
.btn.google{background:#fff;border-color:#dadce0;color:#3c4043;display:flex;align-items:center;justify-content:center;gap:8px;font-size:10px;letter-spacing:1px}
.btn.google img{width:16px;height:16px}

input[type=range]{width:100%;accent-color:var(--amber);cursor:pointer;height:3px;display:block}
.row{display:flex;gap:8px;margin-bottom:8px}
.srow{display:flex;gap:7px;margin-bottom:10px}
.sc{flex:1;background:var(--bg2);border-radius:6px;padding:10px 7px;text-align:center;border:1px solid}
.pbar{background:#162030;height:5px;border-radius:3px;overflow:hidden;margin:7px 0}
.pfill{height:100%;border-radius:3px;transition:width 0.4s}
.li{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--b0)}
.li:last-child{border-bottom:none}
.sh{display:flex;justify-content:space-between;margin-bottom:4px}
.sl{font-size:8.5px;color:var(--t3);letter-spacing:1px}
.sv{font-size:11px;color:var(--amber)}
.sr{margin-bottom:11px}
.cwrap{position:relative;width:100%;margin-top:6px}
.bdots{display:flex;justify-content:center;gap:6px;margin-top:10px}
.bdot{width:6px;height:6px;border-radius:50%;background:var(--t3);cursor:pointer}
.bdot.on{background:var(--green)}
.toggle{display:flex;align-items:center;gap:8px;cursor:pointer}
.tknob{width:36px;height:18px;border-radius:9px;background:var(--bg3);border:1px solid var(--b1);position:relative;transition:background 0.3s;flex-shrink:0}
.tknob.on{background:rgba(34,211,165,0.2);border-color:var(--green)}
.tknob::after{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:var(--t3);top:2px;left:2px;transition:all 0.3s}
.tknob.on::after{background:var(--green);left:20px;box-shadow:0 0 6px var(--green)}
#sl{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:50;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.035) 3px,rgba(0,0,0,0.035) 4px)}
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--amber);border-radius:8px;padding:10px 14px;z-index:200;display:none;align-items:center;gap:10px;white-space:nowrap;box-shadow:0 0 20px rgba(232,160,32,0.2)}
#toast span{font-size:9px;color:var(--amber);letter-spacing:1px}
#toast button{background:var(--amber);color:var(--bg0);border:none;padding:5px 10px;border-radius:3px;font-size:8px;font-weight:700;font-family:inherit;cursor:pointer}
.chk{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--b0);cursor:pointer;-webkit-tap-highlight-color:transparent}
.chk:last-child{border-bottom:none}
.chkbox{width:18px;height:18px;border-radius:3px;border:1px solid var(--b1);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;margin-top:1px;font-size:11px}
.chkbox.done{background:var(--green);border-color:var(--green)}
.chktxt{flex:1}
.chktitle{font-size:11px;color:var(--t1);transition:color 0.2s}
.chktitle.done{color:var(--t3);text-decoration:line-through}
.chksub{font-size:9px;color:var(--t3);margin-top:2px}
.streak-box{background:var(--bg2);border:1px solid var(--amber);border-radius:7px;padding:13px;margin-bottom:10px}
.streak-row{display:flex;justify-content:space-between;align-items:flex-start}
.streak-num{font-family:'Orbitron',monospace;font-size:42px;font-weight:900;color:var(--amber);line-height:1}
.streak-meta{text-align:right;font-size:8.5px;color:var(--t3);line-height:2}

/* SWIPE hint animation */
@keyframes swipehint{0%{opacity:0;transform:translateX(0)}30%{opacity:1}70%{opacity:1;transform:translateX(-12px)}100%{opacity:0;transform:translateX(-12px)}}
.swipehint{position:fixed;bottom:60px;right:16px;font-size:18px;pointer-events:none;animation:swipehint 2s ease 1.5s forwards;z-index:100}
</style>
</head>
<body>
<div id="sl"></div>
<div id="toast"><span id="ttoast"></span><button onclick="dismissToast()">OK</button></div>
<div class="swipehint" id="sh">← swipe</div>

<!-- HEADER -->
<div id="hdr">
  <div class="hdr-top">
    <div>
      <div class="htitle">MEDOPS ⌬ COMMAND</div>
      <div class="hclock" id="clk">THU, APR 23 · 16:12:00</div>
    </div>
    <div class="hright">
      <span class="hcloud off" id="hcloud" title="Google Drive Sync">☁</span>
      <span class="hf" id="hf" style="color:var(--green)">F:--</span>
      <div class="hdot" id="hdot"></div>
    </div>
  </div>
</div>

<!-- TABBAR -->
<div id="tbr">
  <button class="tb on" onclick="go(0)">● ANALYTICS</button>
  <button class="tb"    onclick="go(1)">▶ COMMAND</button>
  <button class="tb"    onclick="go(2)">○ FATIGUE</button>
  <button class="tb"    onclick="go(3)">∿ OPTIMIZER</button>
  <button class="tb"    onclick="go(4)">⊕ PROTOCOL</button>
  <button class="tb"    onclick="go(5)">◈ SYSTEM</button>
</div>

<!-- PAGE DOTS -->
<div id="pagedots">
  <div class="pdot on"></div><div class="pdot"></div><div class="pdot"></div>
  <div class="pdot"></div><div class="pdot"></div><div class="pdot"></div>
</div>

<!-- SWIPE TRACK — 6 pages -->
<div id="swipewrap">
  <div id="swipetrack">
    <div class="swipepage" id="p0"></div>
    <div class="swipepage" id="p1"></div>
    <div class="swipepage" id="p2"></div>
    <div class="swipepage" id="p3"></div>
    <div class="swipepage" id="p4"></div>
    <div class="swipepage" id="p5"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// GOOGLE OAUTH CONFIG
// Replace YOUR_CLIENT_ID with your Google Cloud OAuth 2.0 Client ID
// Get one free at: console.cloud.google.com → APIs & Services → Credentials
// ══════════════════════════════════════════════
const GOOGLE_CLIENT_ID = '662716595691-qr8e428p2he8dfadbq1ob1ukus7lshmr.apps.googleusercontent.com';
const DRIVE_FILENAME   = 'medops_data_v3.json';
const SCOPES           = 'https://www.googleapis.com/auth/drive.appdata';

let gapiReady=false, gisReady=false, accessToken=null;
let tokenClient=null;

function onGapiLoad(){
  gapi.load('client',async()=>{
    await gapi.client.init({discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']});
    gapiReady=true;
    tryInitGIS();
  });
}
function onGISLoad(){gisReady=true;tryInitGIS();}
function tryInitGIS(){
  if(!gapiReady||!gisReady)return;
  if(GOOGLE_CLIENT_ID===''||!GOOGLE_CLIENT_ID){S.cloudSync=false;return;}
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:GOOGLE_CLIENT_ID,scope:SCOPES,
    callback:(resp)=>{
      if(resp.error){showToast('⚠ GOOGLE AUTH FAILED');return;}
      accessToken=resp.access_token;
      S.cloudSync=true;
      loadDriveData();
    }
  });
}

function googleSignIn(){
  if(!GOOGLE_CLIENT_ID||GOOGLE_CLIENT_ID===''){
    showToast('⚠ Add your Google Client ID to enable sync',4000);return;
  }
  if(!tokenClient){showToast('⚠ Google SDK loading — try again in 2s');return;}
  tokenClient.requestAccessToken({prompt:accessToken?'':'consent'});
}

function googleSignOut(){
  if(accessToken){
    google.accounts.oauth2.revoke(accessToken,()=>{});
    accessToken=null;
  }
  S.cloudSync=false;S.userEmail='';save();
  showToast('✓ SIGNED OUT');go(5);
}

async function saveToDrive(){
  if(!accessToken)return;
  try{
    const data=JSON.stringify({sessions:S.sessions,h2o:S.h2o,blockDur:S.blockDur,fi:S.fi,risks:S.risks,bHist:S.bHist,checklist:S.checklist,streak:S.streak,lastLog:S.lastLog,smartAdapt:S.smartAdapt,sleepLog:S.sleepLog,hydLog:S.hydLog,daysLogged:S.daysLogged,blockAdaptations:S.blockAdaptations,userEmail:S.userEmail});
    // Find existing file
    const list=await gapi.client.drive.files.list({spaces:'appDataFolder',q:`name='${DRIVE_FILENAME}'`,fields:'files(id)'});
    const files=list.result.files;
    const boundary='medops_boundary';
    const body=`--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify({name:DRIVE_FILENAME,parents:['appDataFolder']})}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${data}\r\n--${boundary}--`;
    if(files&&files.length>0){
      await gapi.client.request({path:`/upload/drive/v3/files/${files[0].id}`,method:'PATCH',params:{uploadType:'multipart'},headers:{'Content-Type':`multipart/related; boundary=${boundary}`,'Authorization':`Bearer ${accessToken}`},body});
    } else {
      await gapi.client.request({path:'/upload/drive/v3/files',method:'POST',params:{uploadType:'multipart'},headers:{'Content-Type':`multipart/related; boundary=${boundary}`,'Authorization':`Bearer ${accessToken}`},body});
    }
    showToast('☁ SYNCED TO GOOGLE DRIVE');
  }catch(e){showToast('⚠ DRIVE SYNC FAILED');}
}

async function loadDriveData(){
  if(!accessToken)return;
  try{
    const list=await gapi.client.drive.files.list({spaces:'appDataFolder',q:`name='${DRIVE_FILENAME}'`,fields:'files(id)'});
    const files=list.result.files;
    if(!files||files.length===0){showToast('☁ DRIVE CONNECTED — NO PRIOR DATA');return;}
    const resp=await gapi.client.drive.files.get({fileId:files[0].id,alt:'media'});
    const d=typeof resp.result==='string'?JSON.parse(resp.result):resp.result;
    Object.keys(d).forEach(k=>{if(d[k]!==undefined)S[k]=d[k];});
    save();showToast('☁ DATA LOADED FROM GOOGLE DRIVE');
    go(S.tab);
  }catch(e){showToast('⚠ COULD NOT LOAD DRIVE DATA');}
}

// Load Google SDKs dynamically
window.addEventListener('load',()=>{
  const s1=document.createElement('script');s1.src='https://apis.google.com/js/api.js';s1.onload=onGapiLoad;document.head.appendChild(s1);
  const s2=document.createElement('script');s2.src='https://accounts.google.com/gsi/client';s2.onload=onGISLoad;document.head.appendChild(s2);
});

// ══════════════════════════════════════════════
// SWIPE NAVIGATION
// ══════════════════════════════════════════════
const NTABS=6;
let touchX0=0,touchY0=0,dragging=false,dragged=0;
const track=document.getElementById('swipetrack');

function getScrollParent(el){while(el&&el!==document.body){if(el.scrollTop>0||(el.scrollHeight>el.clientHeight&&getComputedStyle(el).overflowY!=='hidden'))return el;el=el.parentElement;}return null;}

track.addEventListener('touchstart',e=>{
  touchX0=e.touches[0].clientX;touchY0=e.touches[0].clientY;dragging=true;dragged=0;
},{passive:true});

track.addEventListener('touchmove',e=>{
  if(!dragging)return;
  const dx=e.touches[0].clientX-touchX0;const dy=e.touches[0].clientY-touchY0;
  if(Math.abs(dy)>Math.abs(dx)+10){dragging=false;return;}
  dragged=dx;
  const base=S.tab*-100;const pct=base+(dx/window.innerWidth*100);
  track.style.transition='none';
  track.style.transform=`translateX(${pct}%)`;
},{passive:true});

track.addEventListener('touchend',e=>{
  if(!dragging)return;dragging=false;
  const threshold=window.innerWidth*0.2;
  if(dragged<-threshold&&S.tab<NTABS-1)goTo(S.tab+1);
  else if(dragged>threshold&&S.tab>0)goTo(S.tab-1);
  else goTo(S.tab);
},{passive:true});

function goTo(i){
  S.tab=i;
  track.style.transition='transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)';
  track.style.transform=`translateX(${i*-100}%)`;
  document.querySelectorAll('.tb').forEach((b,j)=>b.classList.toggle('on',i===j));
  document.querySelectorAll('.pdot').forEach((d,j)=>d.classList.toggle('on',i===j));
  // Scroll active tab into view in tabbar
  const tabs=document.querySelectorAll('.tb');if(tabs[i])tabs[i].scrollIntoView({inline:'center',behavior:'smooth'});
  kc();renderPage(i);hdr();
}

function go(i){goTo(i);}

// ══════════════════════════════════════════════
// ARCHIVE
// ══════════════════════════════════════════════
const ARC={archive_name:"DEEP_FORENSIC_LOSSLESS_JSON_ARCHIVE_MULTILAYERED_NORMALIZED_OS_EXECUTION_ENGINE_INTELLIGENCE_SYSTEM_WITH_MILITARY_GRADE_PERFORMANCE_OPTIMIZER_BAYESIAN_ADAPTATION_MODEL",version:"3.2"};

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
const DEF={tab:0,sessions:[{d:'MON',f:35,acc:88,b:6,h:2800,sl:7},{d:'TUE',f:42,acc:84,b:5,h:2400,sl:6.5},{d:'WED',f:58,acc:76,b:4,h:1900,sl:5},{d:'THU',f:65,acc:71,b:3,h:1600,sl:5.5},{d:'FRI',f:48,acc:82,b:5,h:2600,sl:7},{d:'SAT',f:30,acc:91,b:7,h:3200,sl:8},{d:'SUN',f:22,acc:95,b:4,h:3500,sl:8.5}],tsec:50*60,running:false,phase:'BLOCK',cycle:1,blockDur:50,fi:{sleep:7,studyHours:4,errorRate:20,reaction:20,subjective:30,hydration:60},h2o:0,bStep:0,bHist:[{t:'Init',b:50}],risks:{pain:false,numbness:false,weakness:false,stiffness:false},checklist:[false,false,false,false,false],streak:1,lastLog:new Date().toISOString().slice(0,10),smartAdapt:true,notifAllowed:true,sleepLog:[7,6.5,5,5.5,7,8,8.5],hydLog:[2800,2400,1900,1600,2600,3200,3500],daysLogged:1,blockAdaptations:1,userEmail:'',cloudSync:false};
let S=JSON.parse(JSON.stringify(DEF));
let tiv=null,CJ={};

function save(){try{localStorage.setItem('mo31',JSON.stringify(S));}catch{}}
function load(){try{const d=JSON.parse(localStorage.getItem('mo31'));if(d)Object.assign(S,d);if(S.blockDur)S.tsec=S.blockDur*60;}catch{}}

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function fatigue(){const{sleep,studyHours,errorRate,reaction,subjective,hydration}=S.fi;const sd=Math.max(0,(8-sleep)*12.5);const sl=Math.min(100,(studyHours/12)*100);return Math.max(0,Math.min(100,0.25*sd+0.2*sl+0.2*errorRate+0.15*reaction+0.1*subjective-0.1*hydration));}
function zone(f){if(f<=30)return{l:'OPTIMAL',hex:'#22d3a5',lo:'rgba(34,211,165,0.11)'};if(f<=60)return{l:'FATIGUE ONSET',hex:'#e8a020',lo:'rgba(232,160,32,0.13)'};if(f<=80)return{l:'HIGH FATIGUE',hex:'#fb923c',lo:'rgba(251,146,60,0.12)'};return{l:'CRITICAL',hex:'#f87171',lo:'rgba(248,113,113,0.12)'};}
function dec(f){if(f<40)return{cmd:'CONTINUE',reason:'Peak performance window. Maintain current block.',hex:'#22d3a5'};if(f<60)return{cmd:'SHORT BREAK',reason:'Fatigue onset detected. 5-min break + hydrate.',hex:'#e8a020'};if(f<80)return{cmd:'RECOVER',reason:'High fatigue. 15-min rest + Magnesium + stretch.',hex:'#fb923c'};return{cmd:'SLEEP 90MIN',reason:'Critical fatigue. Cognitive impairment risk. Rest now.',hex:'#f87171'};}
function fmt(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}
function nowStr(){const n=new Date();const days=['SUN','MON','TUE','WED','THU','FRI','SAT'];const months=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];return`${days[n.getDay()]}, ${months[n.getMonth()]} ${n.getDate()} · ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;}

function startStop(){
  if(S.running){clearInterval(tiv);S.running=false;}
  else{
    S.running=true;
    tiv=setInterval(()=>{
      S.tsec--;
      if(S.tsec<=0){
        const f=fatigue();
        if(S.phase==='BLOCK'){const nb=S.smartAdapt?Math.max(25,Math.min(90,S.blockDur+(f<40?5:f>60?-10:-2))):S.blockDur;S.blockDur=nb;S.bHist=[...S.bHist.slice(-13),{t:'C'+(S.cycle+1),b:nb}];S.cycle++;S.blockAdaptations++;S.phase='BREAK';S.tsec=5*60;showToast('⏱ BREAK TIME — '+nb+'min next');}
        else{S.phase='BLOCK';S.tsec=S.blockDur*60;}
        save();
      }
      const td=document.getElementById('td');if(td)td.textContent=fmt(S.tsec);
      const pl=document.getElementById('pl');if(pl)pl.textContent=(S.phase==='BLOCK'?'● STUDY BLOCK':'◎ BREAK')+' — CYCLE '+S.cycle;
      hdr();
    },1000);
  }
  const b=document.getElementById('sb');if(b){b.textContent=S.running?'⏸ PAUSE':'▶ START';b.className=S.running?'btn br':'btn bg';}
  hdr();
}
function resetTimer(){clearInterval(tiv);S.running=false;S.tsec=S.blockDur*60;S.phase='BLOCK';S.cycle=1;renderPage(1);}

  document.getElementById('p2').innerHTML=`
  <div class="cmdbox" style="background:${z.lo};border-color:${z.hex}"><span class="lbl">FATIGUE INDEX</span><div class="big" id="fs" style="font-size:64px;letter-spacing:2px;color:${z.hex}">${Math.round(f)}</div><div id="fz" style="color:${z.hex};font-size:10px;letter-spacing:3px;margin-top:4px">${z.l}</div><div class="pbar" style="margin-top:10px"><div class="pfill" id="fb" style="width:${f}%;background:${z.hex}"></div></div><div style="display:flex;justify-content:space-between;font-size:7.5px;color:var(--t3)"><span>0·OPTIMAL</span><span>30</span><span>60·ONSET</span><span>80·HIGH</span><span>100·CRIT</span></div></div>
  <div class="card"><span class="lbl">INPUT PARAMETERS</span>${params.map(p=>`<div class="sr"><div class="sh"><span class="sl">${p.l}</span><span class="sv" id="fv_${p.k}">${S.fi[p.k]}</span></div><input type="range" min="${p.min}" max="${p.max}" step="${p.step}" value="${S.fi[p.k]}" oninput="updFI('${p.k}',this.value)"></div>`).join('')}</div>
  <div class="card"><span class="lbl">FORMULA ENGINE</span><div style="font-size:10px;color:var(--t2);line-height:2.1">F = (0.25 × sleep_deficit)<br>&nbsp;&nbsp;&nbsp;+ (0.20 × study_load)<br>&nbsp;&nbsp;&nbsp;+ (0.20 × error_rate)<br>&nbsp;&nbsp;&nbsp;+ (0.15 × reaction_delay)<br>&nbsp;&nbsp;&nbsp;+ (0.10 × subjective)<br>&nbsp;&nbsp;&nbsp;− (0.10 × hydration)</div></div>
  <div class="card"><span class="lbl">SLEEP TREND · ${S.sleepLog.length} DAYS</span><div style="display:flex;justify-content:flex-end;margin-bottom:2px;font-size:9px;color:var(--amber)">avg ${avgSl}h</div><div class="cwrap" style="height:90px"><canvas id="csl"></canvas></div></div>
  <div class="cmdbox" id="dbox" style="background:${d.hex}18;border-color:${d.hex}"><span class="lbl">DECISION ENGINE OUTPUT</span><div class="big" id="dcmd" style="font-size:16px;letter-spacing:3px;color:${d.hex}">${d.cmd}</div><div style="color:var(--t2);font-size:10px;margin-top:5px;line-height:1.6" id="dreason">${d.reason}</div></div>`;
  const cd=cdef();const dys=['MON','TUE','WED','THU','FRI','SAT','SUN'].slice(-S.sleepLog.length);
  CJ.sl=new Chart(document.getElementById('csl'),{type:'line',data:{labels:dys,datasets:[{data:S.sleepLog,borderColor:'#22d3a5',backgroundColor:'rgba(34,211,165,0.08)',fill:true,borderWidth:2,pointBackgroundColor:'#22d3a5',pointRadius:3,tension:0.4},{data:Array(S.sleepLog.length).fill(7),borderColor:'rgba(232,160,32,0.4)',borderWidth:1,borderDash:[4,4],fill:false,pointRadius:0}]},options:{...cd,scales:{...cd.scales,y:{...cd.scales.y,min:3,max:10}}}});
}

function rO(){
  const f=fatigue();const f14=Math.round(S.sessions.reduce((a,x)=>a+x.f,0)/S.sessions.length);const a14=Math.round(S.sessions.reduce((a,x)=>a+x.acc,0)/S.sessions.length);const b14=S.sessions.reduce((a,x)=>a+x.b,0);const rules=[{cond:'fatigue > 60 (14d avg)',act:'reduce_block',on:f14>60},{cond:'performance_high (14d)',act:'extend_block',on:f14<40},{cond:'error_rate > 50 (today)',act:'switch_task',on:S.fi.errorRate>50},{cond:'hydration < 2000ml (14d)',act:'hydrate',on:S.h2o<2000}];const baseline=Math.min(S.daysLogged,3);
  document.getElementById('p3').innerHTML=`
  <div class="cmdbox" style="background:var(--purplo);border-color:var(--purple)"><span class="lbl">BAYESIAN BLOCK OPTIMIZER</span><div class="big" style="font-size:54px;color:var(--purple)">${S.blockDur}<span style="font-size:14px;color:var(--t2)">min</span></div><div style="color:var(--t2);font-size:10px;margin-top:4px;letter-spacing:1px">ADAPTIVE BLOCK DURATION</div><div style="color:var(--t3);font-size:8.5px;margin-top:3px">P(θ|D) ∝ P(D|θ) · P(θ) · n=${S.daysLogged}/14d</div></div>
  <div class="srow"><div class="sc" style="border-color:var(--amber)"><span class="lbl">F 14D</span><span class="big" style="font-size:24px;color:var(--amber)">${f14}</span></div><div class="sc" style="border-color:var(--cyan)"><span class="lbl">ACC 14D</span><span class="big" style="font-size:24px;color:var(--cyan)">${a14}%</span></div><div class="sc" style="border-color:var(--green)"><span class="lbl">B/D 14D</span><span class="big" style="font-size:24px;color:var(--green)">${b14}</span></div></div>
  <div class="card"><span class="lbl">ADAPTATION HISTORY</span><div class="cwrap" style="height:110px"><canvas id="cby"></canvas></div></div>
  <div class="card" style="border-color:var(--b1)"><span class="lbl">ADVISORY — 14 DAY EVIDENCE</span><div style="font-size:10px;color:var(--t1);line-height:1.7;margin-bottom:8px">Collecting baseline (${baseline}/3 days). Continue logging — model needs ≥3 days.</div><div style="font-size:9px;color:var(--amber);letter-spacing:1px">RECOMMENDED BLOCK → ${S.blockDur} min</div></div>
  <div class="card"><span class="lbl">ADAPTIVE RULES STATUS</span>${rules.map(r=>`<div class="li"><span style="font-size:9.5px;color:${r.on?'var(--amber)':'var(--t3)'}">IF ${r.cond}</span><span style="font-size:9.5px;color:${r.on?'var(--green)':'var(--t3)'}">→ ${r.act} ${r.on?'●':'○'}</span></div>`).join('')}</div>
  <div class="card"><span class="lbl">BAYESIAN PRIORS</span><div style="display:flex;gap:20px;font-size:10px;color:var(--t2)"><span>optimal_block: <span style="color:var(--purple)">50min</span></span><span>max_cycles: <span style="color:var(--purple)">3</span></span></div><div style="margin-top:7px;font-size:8.5px;color:var(--t3)">Evidence: accuracy · speed · fatigue · hydration · error_patterns</div></div>
  <button class="btn bp bfull" onclick="runBayes()">○ APPLY BAYESIAN UPDATE</button>`;
  const cd=cdef();CJ.by=new Chart(document.getElementById('cby'),{type:'line',data:{labels:S.bHist.map(x=>x.t),datasets:[{data:S.bHist.map(x=>x.b),borderColor:'#a78bfa',fill:false,borderWidth:2,pointBackgroundColor:'#a78bfa',pointRadius:3,tension:0.3}]},options:{...cd,scales:{...cd.scales,y:{...cd.scales.y,min:20,max:95}}}});
}

function rP(){
  const br=BREAKS[S.bStep];const p=todayH2oPace();const avgH=(S.hydLog.reduce((a,x)=>a+x,0)/S.hydLog.length/1000).toFixed(1);const tgtHits=S.hydLog.filter(x=>x>=3500).length;const bestH=(Math.max(...S.hydLog)/1000).toFixed(1);
  document.getElementById('p4').innerHTML=`
  <div class="card cg"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span class="lbl">MICRO-BREAK PROTOCOL</span><span style="font-size:9px;color:var(--t3)" id="bct">${S.bStep+1}/${BREAKS.length}</span></div><div style="text-align:center;padding:8px 0 12px"><div style="font-size:36px;margin-bottom:8px" id="bic">${br.icon}</div><div style="color:var(--green);font-family:'Orbitron',monospace;font-size:12px;font-weight:700;margin-bottom:6px;letter-spacing:1px" id="bnm">${br.name.toUpperCase()}</div><div style="color:var(--t2);font-size:11px;line-height:1.6" id="bds">${br.desc}</div></div><div class="row" style="justify-content:center;gap:10px"><button class="btn" onclick="prevBreak()">← PREV</button><button class="btn bg" onclick="nextBreak()">NEXT →</button></div><div class="bdots">${BREAKS.map((_,i)=>`<div class="bdot ${i===S.bStep?'on':''}" onclick="setBStep(${i})"></div>`).join('')}</div></div>
  <div class="card cc"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span class="lbl">HYDRATION TRACKER · TODAY</span><span style="font-size:10px;color:var(--cyan)" id="h2od">${S.h2o}ml / 3500ml</span></div><div class="pbar"><div class="pfill" id="h2ob" style="width:${Math.min(100,(S.h2o/3500)*100)}%;background:var(--cyan)"></div></div><div style="display:flex;justify-content:space-between;font-size:9px;margin-bottom:8px"><span id="h2opace">${p.behind?`PACE: <span style='color:var(--red)'>● BEHIND ${p.diff}ml</span>`:`PACE: <span style='color:var(--green)'>● ON TRACK</span>`}</span><span style="color:var(--t3)" id="h2otgt">target now: ${p.target}ml</span></div><div style="display:flex;gap:6px;flex-wrap:wrap">${[150,250,500,750].map(ml=>`<button class="btn bc" style="padding:7px 10px;font-size:9.5px" onclick="addH2o(${ml})">+${ml}ml</button>`).join('')}<button class="btn" style="font-size:9.5px;padding:7px 10px" onclick="resetH2o()">RESET</button></div><div id="h2or" style="display:${S.h2o>=3500?'block':'none'};margin-top:8px;color:var(--green);font-size:9.5px;letter-spacing:1px">✓ DAILY TARGET REACHED</div><div style="font-size:8px;color:var(--t3);margin-top:6px">Auto-rolls at midnight · prior days saved to log</div></div>
  <div class="card"><span class="lbl">HYDRATION TREND · ${S.hydLog.length} DAYS</span><div style="display:flex;justify-content:flex-end;margin-bottom:2px;font-size:9px;color:var(--amber)">avg ${avgH}L</div><div class="cwrap" style="height:90px"><canvas id="chyd"></canvas></div><div style="display:flex;justify-content:space-between;margin-top:8px;font-size:9px"><span style="color:var(--t3)">Target hits: <span style="color:var(--amber)">${tgtHits}/${S.hydLog.length}</span></span><span style="color:var(--t3)">Best: <span style="color:var(--cyan)">${bestH}L</span></span><span style="color:var(--t3)">7d total: <span style="color:var(--green)">${(S.hydLog.reduce((a,x)=>a+x,0)/1000).toFixed(1)}L</span></span></div>${S.h2o<2000?`<div style="background:rgba(248,113,113,0.08);border-radius:4px;padding:8px;margin-top:8px;font-size:9px;color:var(--red);line-height:1.6">● Chronic underhydration — directly inflating fatigue. Start with 500ml on waking tomorrow.</div>`:''}</div>
  <div class="card"><span class="lbl">INTERVENTION PROTOCOL</span>${[{name:'Paracetamol',note:'Analgesia — general pain relief',c:'var(--t2)'},{name:'Ibuprofen',note:'NSAID — inflammation reduction',c:'var(--t2)'},{name:'Magnesium Citrate',note:'Stimulant tension + sleep quality',c:'var(--amber)'},{name:'ORS / Coconut Water',note:'Electrolyte + rapid rehydration',c:'var(--cyan)'}].map(i=>`<div class="li"><span style="font-size:11px;color:${i.c}">${i.name}</span><span style="font-size:8.5px;color:var(--t3);text-align:right;max-width:55%">${i.note}</span></div>`).join('')}</div>`;
  const cd=cdef();const dys=['MON','TUE','WED','THU','FRI','SAT','SUN'].slice(-S.hydLog.length);CJ.hy=new Chart(document.getElementById('chyd'),{type:'bar',data:{labels:dys,datasets:[{data:S.hydLog.map(x=>+(x/1000).toFixed(1)),backgroundColor:S.hydLog.map(x=>x>=3500?'rgba(34,211,165,0.65)':x>=2000?'rgba(56,189,248,0.55)':'rgba(248,113,113,0.55)'),borderRadius:2},{data:Array(S.hydLog.length).fill(3.5),borderColor:'rgba(232,160,32,0.4)',borderWidth:1,type:'line',pointRadius:0,fill:false}]},options:{...cd,scales:{...cd.scales,y:{...cd.scales.y,min:0,max:4.5}}}});
}

function rS(){
  const f=fatigue();const z=zone(f);const fm=[{name:'Burnout',risk:f>70?'HIGH':f>50?'MODERATE':'LOW',c:f>70?'var(--red)':f>50?'var(--amber)':'var(--green)'},{name:'Injury',risk:(S.risks.pain||S.risks.stiffness)?'ELEVATED':'LOW',c:(S.risks.pain||S.risks.stiffness)?'var(--amber)':'var(--green)'},{name:'Cognitive Decline',risk:f>80?'HIGH':'LOW',c:f>80?'var(--red)':'var(--green)'}];
  document.getElementById('p5').innerHTML=`
  <div class="card cr"><span class="lbl">RED FLAG MONITOR</span>${[{k:'pain',l:'Persistent Pain'},{k:'numbness',l:'Numbness'},{k:'weakness',l:'Weakness'},{k:'stiffness',l:'Severe Stiffness'}].map(({k,l})=>`<div class="li"><span style="font-size:11px;color:${S.risks[k]?'var(--red)':'var(--t2)'}" id="rl_${k}">${l}</span><button class="btn ${S.risks[k]?'br':''}" id="rb_${k}" style="padding:5px 12px;font-size:8.5px" onclick="toggleRisk('${k}')">${S.risks[k]?'● FLAGGED':'○ CLEAR'}</button></div>`).join('')}<div id="rw" style="display:${Object.values(S.risks).some(Boolean)?'block':'none'};margin-top:10px;padding:10px;background:var(--redlo);border-radius:4px;font-size:9.5px;color:var(--red);line-height:1.5">⚠ Flag(s) active. Consult a medical professional if symptoms persist.</div></div>
  <div class="card"><span class="lbl">FAILURE MODE WATCHLIST</span>${fm.map(x=>`<div class="li"><span style="font-size:11px;color:var(--t2)">${x.name}</span><span style="font-size:10px;color:${x.c};letter-spacing:1px">${x.risk}</span></div>`).join('')}</div>
  <div class="card cg"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span class="lbl" style="margin-bottom:0">SMART ADAPT MODE</span><div class="toggle" onclick="toggleSmartAdapt()"><div class="tknob ${S.smartAdapt?'on':''}" id="saknob"></div><span style="font-size:9px;color:${S.smartAdapt?'var(--green)':'var(--t3)'}" id="salbl">${S.smartAdapt?'● ON':'○ OFF'}</span></div></div><div style="font-size:9.5px;color:var(--t2);line-height:1.7">When ON, the Bayesian model auto-applies its recommended block at the end of every cycle and at midnight — no taps needed. Works offline.</div><div style="margin-top:8px;font-size:9px;color:var(--green)">▶ Model output → next block: ${S.blockDur}min</div></div>
  <div class="card" style="border-color:var(--b1)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span class="lbl" style="margin-bottom:0">NOTIFICATIONS</span><span style="font-size:8.5px;color:${S.notifAllowed?'var(--green)':'var(--t3)'}">● ${S.notifAllowed?'ALLOWED':'OFF'}</span></div><div style="font-size:9.5px;color:var(--t2);line-height:1.7;margin-bottom:10px">Block transitions, critical fatigue, sleep log, hydration shortfalls.</div><button class="btn bfull" onclick="sendTestPing()">SEND TEST PING</button></div>
  <div class="card"><span class="lbl">DATA STORE</span><div style="font-size:10px;color:var(--t2);line-height:2">Days logged: <span style="color:var(--amber)">${S.daysLogged}</span> / 30 max<br>Block adaptations: <span style="color:var(--amber)">${S.blockAdaptations}</span><br>Today: <span style="color:var(--cyan)">${new Date().toISOString().slice(0,10)}</span> · ${['SUN','MON','TUE','WED','THU','FRI','SAT'][new Date().getDay()]}</div><div class="row" style="margin-top:10px;gap:8px"><button class="btn ba" style="flex:1;font-size:9px" onclick="resetToday()">↺ RESET TODAY</button><button class="btn br" style="flex:1;font-size:9px" onclick="wipeAll()">⚠ WIPE ALL</button></div></div>
  <div class="card"><span class="lbl">WEEKLY STRUCTURE</span>${['MORNING DEEP WORK','MIDDAY INTEGRATION','AFTERNOON APPLICATION','EVENING REVIEW'].map((x,i)=>`<div class="li"><span style="font-size:9px;color:var(--purple);min-width:18px">${i+1}.</span><span style="font-size:10px;color:var(--t2)">${x}</span></div>`).join('')}<div style="margin-top:8px;font-size:8.5px;color:var(--t3)">6 active days · 1 full recovery day</div></div>
  <div class="card cg">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span class="lbl" style="margin-bottom:0">CLOUD SYNC · GOOGLE DRIVE</span><span style="font-size:8.5px;color:${S.cloudSync?'var(--green)':'var(--t3)'}">○ ${S.cloudSync?'CONNECTED':'IDLE'}</span></div>
    ${S.cloudSync&&S.userEmail?
      `<div style="font-size:9.5px;color:var(--t2);line-height:1.7;margin-bottom:8px">Signed in as <span style="color:var(--green)">${S.userEmail}</span><br>Your data mirrors to Google Drive — accessible on any device.</div><div class="row" style="gap:8px"><button class="btn" style="flex:1;font-size:8.5px" onclick="googleSignOut()">○ SIGN OUT (KEEP DATA)</button><button class="btn br" style="flex:1;font-size:8.5px" onclick="googleSignOut()">○ SIGN OUT + WIPE</button></div>`:
      `<div style="font-size:9.5px;color:var(--t2);line-height:1.7;margin-bottom:10px">Sign in with Google to mirror your data to Drive. Access MedOps from any device with the same account.</div><button class="btn bfull" style="background:#fff;border-color:#dadce0;color:#3c4043;display:flex;align-items:center;justify-content:center;gap:8px;font-size:10px" onclick="googleSignIn()"><svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>SIGN IN WITH GOOGLE</button>`
    }
  </div>
  <div class="card ca"><span class="lbl">WEEKLY REPORT</span><div style="font-size:9.5px;color:var(--t2);line-height:1.7;margin-bottom:10px">One-page printable summary — fatigue, accuracy, blocks, hydration, streak, Bayesian advisory. Save as PDF.</div><button class="btn ba bfull" onclick="openWeeklyReport()">≡ OPEN WEEKLY REPORT</button></div>
  <div class="card ca"><span class="lbl">SYSTEM ARCHIVE — v3.1</span><div style="font-size:8.5px;color:var(--t2);line-height:1.9;margin-bottom:10px">F=${Math.round(f)} · Zone=${z.l} · Block=${S.blockDur}min<br>H₂O=${S.h2o}ml · Cycles=${S.cycle} · ${new Date().toISOString().slice(0,10)}</div><button class="btn ba bfull" style="font-weight:700;letter-spacing:2px;font-size:10.5px" onclick="dlArchive()">↓ DOWNLOAD JSON ARCHIVE v3.1</button></div>
  <div style="text-align:center;color:var(--t3);font-size:7.5px;letter-spacing:2px;margin-top:14px;line-height:2">MEDOPS COMMAND v3.1 · ALL LAYERS ACTIVE<br>ANTHROPIC / CLAUDE</div>`;
}

// ══════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════
load();
// Render all pages
for(let i=0;i<6;i++)renderPage(i);
// Position to current tab
track.style.transition='none';
track.style.transform=`translateX(${S.tab*-100}%)`;
document.querySelectorAll('.tb').forEach((b,j)=>b.classList.toggle('on',S.tab===j));
document.querySelectorAll('.pdot').forEach((d,j)=>d.classList.toggle('on',S.tab===j));
hdr();
setInterval(clockTick,1000);
clockTick();
// Hide swipe hint after 5s
setTimeout(()=>{const h=document.getElementById('sh');if(h)h.remove();},5000);
</script>
</body>
</html>
